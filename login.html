<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinDash — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">💹</div>
      <div class="login-logo-text">Fin<span>Dash</span></div>
    </div>
    <h1 class="login-title">Bem-vindo de volta</h1>
    <p class="login-subtitle">Faça login para acessar seu dashboard financeiro.</p>

    <form id="loginForm" autocomplete="off" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Usuário</label>
        <input class="form-input" type="text" id="username" name="username"
          placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="password" name="password"
            placeholder="••••••••" autocomplete="current-password" required style="padding-right:44px">
          <button type="button" id="togglePassword" class="toggle-pwd" aria-label="Mostrar senha">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
